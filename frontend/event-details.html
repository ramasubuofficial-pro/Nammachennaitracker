<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <style>
        #mini-map { height: 300px; width: 100%; border-radius: 1rem; margin-top: 2rem; border: 1px solid var(--glass-border); }
        .details-container { padding: 4rem 0; min-height: 80vh; }
        .back-link { display: inline-flex; align-items: center; gap: 0.5rem; text-decoration: none; color: var(--accent); font-weight: 600; margin-bottom: 2rem; transition: transform 0.2s; }
        .back-link:hover { transform: translateX(-5px); }
        .detail-hero { margin-bottom: 3rem; }
        .detail-grid { display: grid; grid-template-columns: 1fr 350px; gap: 3rem; }
        @media (max-width: 900px) { .detail-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <nav>
        <div class="container nav-content">
            <div class="logo-group">
                <h1 id="site-title">Namma Chennai Tracker</h1>

            </div>
            <div class="nav-links">
                <a href="index.html">Home / இல்லம்</a>
                <a href="parties.html">Parties / கட்சிகள்</a>

                <button id="lang-toggle" class="glass">EN / த</button>
            </div>
        </div>
    </nav>

    <main class="container details-container">
        <a href="index.html" class="back-link">← Back to Overview / பின்னால் செல்</a>
        
        <div id="event-content">
            <div class="glass" style="padding: 4rem; text-align: center;">Loading event details...</div>
        </div>
    </main>

    <footer>

        </div>

    <script src="js/event-details.js"></script>
